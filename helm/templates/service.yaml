apiVersion: v1
kind: Service
metadata:
  name: {{ include "aiops-quality.fullname" . }}
  labels:
    {{- include "aiops-quality.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "aiops-quality.selectorLabels" . | nindent 4 }}
