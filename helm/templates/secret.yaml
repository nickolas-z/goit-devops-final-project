{{/*
Chart-керований Secret з токеном створюється ЛИШЕ для ручних install-ів:
коли webhook увімкнено, existingSecret не задано і token переданий напряму.
Для GitOps використовуйте retrainWebhook.existingSecret (токен не в git).
*/}}
{{- if and .Values.retrainWebhook.enabled (not .Values.retrainWebhook.existingSecret) .Values.retrainWebhook.token -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiops-quality.fullname" . }}-webhook
  labels:
    {{- include "aiops-quality.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.retrainWebhook.token | quote }}
{{- end }}
